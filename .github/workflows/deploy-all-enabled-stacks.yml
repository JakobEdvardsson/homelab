name: Deploy All Enabled Stacks

on:
  workflow_dispatch:

concurrency:
  group: deploy-all-enabled-stacks
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Connect to tailnet
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Deploy all enabled stacks
        env:
          SSH_PRIVATE_KEY: ${{ secrets.HOMELAB_SSH_PRIVATE_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.HOMELAB_SSH_KNOWN_HOSTS }}
          HOMELAB_HOST: ${{ secrets.HOMELAB_TAILSCALE_HOST }}
          HOMELAB_USER: ${{ secrets.HOMELAB_SSH_USER }}
          REPO_DIR: ${{ secrets.HOMELAB_REPO_DIR }}
          BRANCH: main
        run: |
          install -d -m 700 "$HOME/.ssh"
          printf '%s\n' "$SSH_PRIVATE_KEY" > "$HOME/.ssh/id_ed25519"
          chmod 600 "$HOME/.ssh/id_ed25519"
          printf '%s\n' "$SSH_KNOWN_HOSTS" > "$HOME/.ssh/known_hosts"
          chmod 600 "$HOME/.ssh/known_hosts"

          echo "[deploy-all] connecting to $HOMELAB_USER@$HOMELAB_HOST"
          ssh -T \
            -i "$HOME/.ssh/id_ed25519" \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=yes \
            "$HOMELAB_USER@$HOMELAB_HOST" \
            "set -euxo pipefail; REPO_DIR='$REPO_DIR' BRANCH='$BRANCH' bash -s" \
            < ./scripts/deploy-all-enabled-stacks.sh
