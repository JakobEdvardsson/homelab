name: Deploy Changed Stacks

on:
  push:
    branches:
      - main
    paths:
      - docker/**
      - scripts/deploy-changed-stacks.sh
      - .github/workflows/deploy-changed-stacks.yml
  workflow_dispatch:

concurrency:
  group: deploy-changed-stacks
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Connect to tailnet
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Deploy changed stacks
        env:
          SSH_PRIVATE_KEY: ${{ secrets.HOMELAB_SSH_PRIVATE_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.HOMELAB_SSH_KNOWN_HOSTS }}
          HOMELAB_HOST: ${{ secrets.HOMELAB_TAILSCALE_HOST }}
          HOMELAB_USER: ${{ secrets.HOMELAB_SSH_USER }}
          REPO_DIR: ${{ secrets.HOMELAB_REPO_DIR }}
          BRANCH: main
          BEFORE_SHA: ${{ github.event.before }}
          AFTER_SHA: ${{ github.sha }}
        run: |
          install -d -m 700 "$HOME/.ssh"
          printf '%s\n' "$SSH_PRIVATE_KEY" > "$HOME/.ssh/id_ed25519"
          chmod 600 "$HOME/.ssh/id_ed25519"
          printf '%s\n' "$SSH_KNOWN_HOSTS" > "$HOME/.ssh/known_hosts"
          chmod 600 "$HOME/.ssh/known_hosts"

          echo "[deploy] connecting to $HOMELAB_USER@$HOMELAB_HOST"
          ssh -tt \
            -i "$HOME/.ssh/id_ed25519" \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            "$HOMELAB_USER@$HOMELAB_HOST" \
            "set -euxo pipefail; REPO_DIR='$REPO_DIR' BRANCH='$BRANCH' BEFORE_SHA='$BEFORE_SHA' AFTER_SHA='$AFTER_SHA' bash '$REPO_DIR/scripts/deploy-changed-stacks.sh'"
