services:
  dockge:
    container_name: dockge
    image: louislam/dockge:1
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${APPDATA_ROOT}/dockge:/app/data
      - /mnt/user/appdata/homelab/docker:/mnt/user/appdata/homelab/docker
    environment:
      DOCKGE_STACKS_DIR: /mnt/user/appdata/homelab/docker
    labels:
      net.unraid.docker.icon: "https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/dockge.png"
      net.unraid.docker.webui: "https://dockge.edvardsson.dev"
      net.unraid.docker.shell: "sh"
      folder.view3: "dockge"
    networks:
      - default
      - caddy_internal

networks:
  caddy_internal:
    external: true
