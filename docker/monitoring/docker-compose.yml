name: monitoring

services:
  prometheus:
    container_name: prometheus
    image: prom/prometheus:latest
    restart: unless-stopped
    env_file:
      - .env
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    volumes:
      - ./prometheus:/etc/prometheus:ro
      - ${APPDATA_ROOT}/prometheus:/prometheus
    labels:
      net.unraid.docker.managed: "composeman"
      net.unraid.docker.icon: "https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/prometheus.png"
      net.unraid.docker.webui: "https://prometheus.edvardsson.dev"
      net.unraid.docker.shell: "sh"
      folder.view3: "monitoring"
    networks:
      - default
      - caddy_internal
      - monitoring

  grafana:
    container_name: grafana
    image: grafana/grafana:latest
    restart: unless-stopped
    env_file:
      - .env
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_SERVER_ROOT_URL: https://grafana.${BASE_DOMAIN}
      GF_SERVER_DOMAIN: grafana.${BASE_DOMAIN}
      GF_SERVER_SERVE_FROM_SUB_PATH: "false"
    volumes:
      - ${APPDATA_ROOT}/grafana:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    labels:
      net.unraid.docker.managed: "composeman"
      net.unraid.docker.icon: "https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/grafana.png"
      net.unraid.docker.webui: "https://grafana.edvardsson.dev"
      net.unraid.docker.shell: "sh"
      folder.view3: "monitoring"
    networks:
      - default
      - caddy_internal
      - monitoring

  healthchecks:
    container_name: healthchecks
    image: healthchecks/healthchecks:latest
    restart: unless-stopped
    env_file:
      - .env
    environment:
      TZ: ${TZ}
      SITE_ROOT: https://healthchecks.${BASE_DOMAIN}
      SITE_NAME: Homelab Healthchecks
      SECRET_KEY: ${HEALTHCHECKS_SECRET_KEY}
      ALLOWED_HOSTS: healthchecks.${BASE_DOMAIN}
      DB: sqlite
      DB_NAME: /data/hc.sqlite
    volumes:
      - ${APPDATA_ROOT}/healthchecks:/data
    labels:
      net.unraid.docker.managed: "composeman"
      net.unraid.docker.icon: "https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/healthchecks.png"
      net.unraid.docker.webui: "https://healthchecks.edvardsson.dev"
      net.unraid.docker.shell: "sh"
      folder.view3: "monitoring"
    networks:
      - default
      - caddy_internal
      - monitoring

  node-exporter:
    container_name: node-exporter
    image: prom/node-exporter:latest
    restart: unless-stopped
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --collector.processes
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    labels:
      net.unraid.docker.managed: "composeman"
      net.unraid.docker.icon: "https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/prometheus.png"
      net.unraid.docker.webui: ""
      net.unraid.docker.shell: "sh"
      folder.view3: "monitoring"
    networks:
      - default
      - monitoring

  immich-exporter:
    container_name: immich-exporter
    image: friendlyfriend/prometheus-immich-exporter:latest
    restart: unless-stopped
    env_file:
      - .env
    environment:
      IMMICH_HOST: immich_server
      IMMICH_PORT: 2283
      EXPORTER_PORT: 9183
      EXPORTER_LOG_LEVEL: WARNING
    labels:
      net.unraid.docker.managed: "composeman"
      net.unraid.docker.icon: "https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/prometheus.png"
      net.unraid.docker.webui: ""
      net.unraid.docker.shell: "sh"
      folder.view3: "monitoring"
    networks:
      - default
      - monitoring

networks:
  caddy_internal:
    external: true
  monitoring:
    name: monitoring
    driver: bridge
    internal: true
