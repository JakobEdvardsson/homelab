global:
  scrape_interval: 1m

scrape_configs:
  - job_name: node
    static_configs:
      - targets:
          - node-exporter:9100

  - job_name: prometheus
    scrape_interval: 5s
    static_configs:
      - targets:
          - prometheus:9090

  - job_name: immich
    static_configs:
      - targets:
          - immich-exporter:9183

  - job_name: cadvisor
    static_configs:
      - targets:
          - cadvisor:8080

  - job_name: booli_api
    metrics_path: /metrics
    static_configs:
      - targets:
          - booli-api:8080

  - job_name: booli_pushgateway
    honor_labels: true
    static_configs:
      - targets:
          - booli-pushgateway:9091
