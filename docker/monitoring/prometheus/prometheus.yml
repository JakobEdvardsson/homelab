global:
  scrape_interval: 1m

scrape_configs:
  - job_name: node
    static_configs:
      - targets:
          - node-exporter:9100

  - job_name: prometheus
    scrape_interval: 5s
    static_configs:
      - targets:
          - prometheus:9090

  - job_name: deluge
    static_configs:
      - targets:
          - deluge-exporter:9354

  - job_name: immich
    static_configs:
      - targets:
          - immich-exporter:9183
