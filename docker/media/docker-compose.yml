      net.unraid.docker.managed: "composeman"
      net.unraid.docker.icon: "https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/bazarr.png"
      net.unraid.docker.webui: "https://bazarr.edvardsson.dev"
      net.unraid.docker.shell: "sh"
      folder.view3: "media"
    networks:
      - caddy_internal

