name: booli

services:
  booli-neo4j:
    container_name: booli-neo4j
    image: neo4j:2025.01.0-community
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NEO4J_AUTH: ${BOOLI_NEO4J_USERNAME}/${BOOLI_NEO4J_PASSWORD}
      NEO4J_server_default__listen__address: 0.0.0.0
      NEO4J_server_default__advertised__address: booli-neo4j
    ports:
      - "${BOOLI_NEO4J_HTTP_PUBLISHED_PORT}:7474"
      - "${BOOLI_NEO4J_BOLT_PUBLISHED_PORT}:7687"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "cypher-shell -a bolt://127.0.0.1:7687 -u \"$${NEO4J_AUTH%%/*}\" -p \"$${NEO4J_AUTH#*/}\" 'RETURN 1' >/dev/null 2>&1 || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 45s
    volumes:
      - ${APPDATA_ROOT}/booli/neo4j/data:/data
      - ${APPDATA_ROOT}/booli/neo4j/logs:/logs
      - ${APPDATA_ROOT}/booli/neo4j/import:/var/lib/neo4j/import
      - ${APPDATA_ROOT}/booli/neo4j/plugins:/plugins
    labels:
      net.unraid.docker.icon: "https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/neo4j.png"
      net.unraid.docker.webui: ""
      net.unraid.docker.shell: "sh"
      folder.view3: "booli"
    networks:
      - default
      - monitoring

  booli-api:
    container_name: booli-api
    image: ghcr.io/jakobedvardsson/booli-scraper-api:${BOOLI_IMAGE_TAG}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NEO4J_URI: ${BOOLI_NEO4J_URI}
      NEO4J_USERNAME: ${BOOLI_NEO4J_USERNAME}
      NEO4J_PASSWORD: ${BOOLI_NEO4J_PASSWORD}
      NEO4J_DATABASE: ${BOOLI_NEO4J_DATABASE}
      NEO4J_SCHEMA_ENSURE_ENABLED: "true"
    volumes:
      - ${APPDATA_ROOT}/booli/data:/app/data
    depends_on:
      booli-neo4j:
        condition: service_healthy
    ports:
      - "${BOOLI_API_PUBLISHED_PORT}:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/ready >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    labels:
      net.unraid.docker.icon: "https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/neo4j.png"
      net.unraid.docker.webui: ""
      net.unraid.docker.shell: "sh"
      folder.view3: "booli"
    networks:
      - default
      - monitoring

  booli-web:
    container_name: booli-web
    image: ghcr.io/jakobedvardsson/booli-scraper-web:${BOOLI_IMAGE_TAG}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      INTERNAL_API_BASE_URL: http://booli-api:8080
    depends_on:
      booli-api:
        condition: service_healthy
    ports:
      - "${BOOLI_WEB_PUBLISHED_PORT}:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000 >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    labels:
      net.unraid.docker.icon: "https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/home-assistant.png"
      net.unraid.docker.webui: ""
      net.unraid.docker.shell: "sh"
      folder.view3: "booli"
    networks:
      - default
      - caddy_internal

  booli-pushgateway:
    container_name: booli-pushgateway
    image: prom/pushgateway:v1.11.2
    restart: unless-stopped
    command:
      - --persistence.file=/data/metrics.db
      - --persistence.interval=1m
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9091/-/healthy >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - ${APPDATA_ROOT}/booli/pushgateway:/data
    labels:
      net.unraid.docker.icon: "https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/prometheus.png"
      net.unraid.docker.webui: ""
      net.unraid.docker.shell: "sh"
      folder.view3: "booli"
    networks:
      - default
      - monitoring

  booli-scraper:
    container_name: booli-scraper
    image: ghcr.io/jakobedvardsson/booli-scraper-scraper:${BOOLI_IMAGE_TAG}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NEO4J_URI: ${BOOLI_NEO4J_URI}
      NEO4J_USERNAME: ${BOOLI_NEO4J_USERNAME}
      NEO4J_PASSWORD: ${BOOLI_NEO4J_PASSWORD}
      NEO4J_DATABASE: ${BOOLI_NEO4J_DATABASE}
      NEO4J_SCHEMA_ENSURE_ENABLED: "false"
      SCRAPE_SEARCH_URL: ${BOOLI_SCRAPE_SEARCH_URL}
      SCRAPE_INTERVAL_SECONDS: ${BOOLI_SCRAPE_INTERVAL_SECONDS}
      SCRAPER_IMAGE_DOWNLOAD_ENABLED: ${BOOLI_IMAGE_DOWNLOAD_ENABLED}
      SCRAPER_IMAGE_DOWNLOAD_TIMEOUT_SECONDS: ${BOOLI_IMAGE_DOWNLOAD_TIMEOUT_SECONDS}
      SCRAPER_IMAGE_DOWNLOAD_RETRIES: ${BOOLI_IMAGE_DOWNLOAD_RETRIES}
      SCRAPER_IMAGE_DOWNLOAD_VERBOSE: ${BOOLI_IMAGE_DOWNLOAD_VERBOSE}
      PROMETHEUS_PUSHGATEWAY_URL: http://booli-pushgateway:9091
    depends_on:
      booli-neo4j:
        condition: service_healthy
      booli-api:
        condition: service_healthy
      booli-pushgateway:
        condition: service_healthy
    command:
      - /bin/sh
      - -c
      - |
        echo "Starting scraper scheduler; interval=$${SCRAPE_INTERVAL_SECONDS:-3600}s";
        while true; do
          /app/scrape || true;
          sleep "$${SCRAPE_INTERVAL_SECONDS:-3600}";
        done
    volumes:
      - ${APPDATA_ROOT}/booli/data:/app/data
    labels:
      net.unraid.docker.icon: "https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/docker.png"
      net.unraid.docker.webui: ""
      net.unraid.docker.shell: "sh"
      folder.view3: "booli"
    networks:
      - default

  booli-status:
    container_name: booli-status
    image: ghcr.io/jakobedvardsson/booli-scraper-status:${BOOLI_IMAGE_TAG}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NEO4J_URI: ${BOOLI_NEO4J_URI}
      NEO4J_USERNAME: ${BOOLI_NEO4J_USERNAME}
      NEO4J_PASSWORD: ${BOOLI_NEO4J_PASSWORD}
      NEO4J_DATABASE: ${BOOLI_NEO4J_DATABASE}
      STATUS_CHECK_INTERVAL_SECONDS: ${BOOLI_STATUS_CHECK_INTERVAL_SECONDS}
      PROMETHEUS_PUSHGATEWAY_URL: http://booli-pushgateway:9091
    depends_on:
      booli-neo4j:
        condition: service_healthy
      booli-api:
        condition: service_healthy
      booli-pushgateway:
        condition: service_healthy
    command:
      - /bin/sh
      - -c
      - |
        echo "Starting sold-status checker; interval=$${STATUS_CHECK_INTERVAL_SECONDS:-21600}s";
        while true; do
          /app/status || true;
          sleep "$${STATUS_CHECK_INTERVAL_SECONDS:-21600}";
        done
    volumes:
      - ${APPDATA_ROOT}/booli/data:/app/data
    labels:
      net.unraid.docker.icon: "https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/docker.png"
      net.unraid.docker.webui: ""
      net.unraid.docker.shell: "sh"
      folder.view3: "booli"
    networks:
      - default

  booli-sold-history:
    container_name: booli-sold-history
    image: ghcr.io/jakobedvardsson/booli-scraper-sold-history:${BOOLI_IMAGE_TAG}
    profiles:
      - manual
    env_file:
      - .env
    environment:
      NEO4J_URI: ${BOOLI_NEO4J_URI}
      NEO4J_USERNAME: ${BOOLI_NEO4J_USERNAME}
      NEO4J_PASSWORD: ${BOOLI_NEO4J_PASSWORD}
      NEO4J_DATABASE: ${BOOLI_NEO4J_DATABASE}
      SOLD_HISTORY_SEARCH_URL: ${BOOLI_SOLD_HISTORY_SEARCH_URL}
      SCRAPER_IMAGE_DOWNLOAD_ENABLED: ${BOOLI_IMAGE_DOWNLOAD_ENABLED}
      SCRAPER_IMAGE_DOWNLOAD_TIMEOUT_SECONDS: ${BOOLI_IMAGE_DOWNLOAD_TIMEOUT_SECONDS}
      SCRAPER_IMAGE_DOWNLOAD_RETRIES: ${BOOLI_IMAGE_DOWNLOAD_RETRIES}
      SCRAPER_IMAGE_DOWNLOAD_VERBOSE: ${BOOLI_IMAGE_DOWNLOAD_VERBOSE}
      PROMETHEUS_PUSHGATEWAY_URL: http://booli-pushgateway:9091
    depends_on:
      booli-neo4j:
        condition: service_healthy
      booli-api:
        condition: service_healthy
      booli-pushgateway:
        condition: service_healthy
    volumes:
      - ${APPDATA_ROOT}/booli/data:/app/data
    labels:
      net.unraid.docker.icon: "https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/docker.png"
      net.unraid.docker.webui: ""
      net.unraid.docker.shell: "sh"
      folder.view3: "booli"
    networks:
      - default

networks:
  caddy_internal:
    external: true
  monitoring:
    external: true
