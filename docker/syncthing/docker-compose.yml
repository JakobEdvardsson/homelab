name: syncthing

services:
  syncthing:
    container_name: syncthing
    image: lscr.io/linuxserver/syncthing:latest
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ: ${TZ}
    ports:
      - "8384:8384"
      - "22000:22000/tcp"
      - "22000:22000/udp"
      - "21027:21027/udp"
    volumes:
      - /mnt/user/appdata/syncthing:/config
      - /mnt/user/syncthing:/media
    labels:
      net.unraid.docker.managed: "composeman"
      net.unraid.docker.icon: "https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/syncthing.png"
      net.unraid.docker.webui: "https://syncthing.edvardsson.dev"
      net.unraid.docker.shell: "sh"
      folder.view3: "syncthing"
    networks:
      - default
      - caddy_internal

networks:
  caddy_internal:
    external: true
