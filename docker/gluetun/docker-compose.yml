name: gluetun

services:
  gluetun:
    container_name: gluetun
    image: qmcgaw/gluetun:latest
    dns:
      - ${DOCKER_DNS_1}
      - ${DOCKER_DNS_2}
      - ${DOCKER_DNS_3}
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    env_file:
      - .env
    environment:
      TZ: ${TZ}
      VPN_SERVICE_PROVIDER: ${VPN_SERVICE_PROVIDER}
      VPN_TYPE: ${VPN_TYPE}
      WIREGUARD_PRIVATE_KEY: ${WIREGUARD_PRIVATE_KEY}
      SERVER_COUNTRIES: ${SERVER_COUNTRIES}
      FIREWALL_INPUT_PORTS: 8080,${MOUSEHOLE_PORT},${QBITTORRENT_TORRENTING_PORT}
      FIREWALL_OUTBOUND_SUBNETS: 10.0.0.0/24
    ports:
      - "${QBITTORRENT_TORRENTING_PORT}:${QBITTORRENT_TORRENTING_PORT}"
      - "${QBITTORRENT_TORRENTING_PORT}:${QBITTORRENT_TORRENTING_PORT}/udp"
    volumes:
      - ${APPDATA_ROOT}/gluetun:/gluetun
    labels:
      net.unraid.docker.managed: "composeman"
      net.unraid.docker.icon: "https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/gluetun.png"
      net.unraid.docker.webui: ""
      net.unraid.docker.shell: "sh"
      folder.view3: "gluetun"
    networks:
      - default
      - caddy_internal

networks:
  caddy_internal:
    external: true
