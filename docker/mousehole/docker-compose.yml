name: mousehole

services:
  mousehole:
    container_name: mousehole
    image: tmmrtn/mousehole:latest
    restart: unless-stopped
    network_mode: "container:gluetun"
    env_file:
      - .env
    environment:
      TZ: ${TZ}
      MOUSEHOLE_PORT: ${MOUSEHOLE_PORT}
      MOUSEHOLE_STATE_DIR_PATH: /srv/mousehole
      MOUSEHOLE_INSECURE_ALLOW_NO_AUTH: "true"
      MOUSEHOLE_ALLOWED_HOSTS: "mousehole.${BASE_DOMAIN}"
      MOUSEHOLE_HTTPS_ONLY_COOKIES: "true"
    volumes:
      - ${APPDATA_ROOT}/mousehole:/srv/mousehole
    labels:
      net.unraid.docker.managed: "composeman"
      net.unraid.docker.icon: "https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/mousehole.png"
      net.unraid.docker.webui: "https://mousehole.edvardsson.dev"
      net.unraid.docker.shell: "sh"
      folder.view3: "qbittorrent"
